{% extends "base.html" %}

{% block title %}店舗作成 - 在庫管理システム{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/form.css') }}">
{% endblock %}

{% block content %}
<div class="form-page">
    <h1>新しい店舗を作成</h1>
    
    <form method="POST" id="createStoreForm">
        <!-- 店舗名 -->
        <div class="form-group">
            <label for="store_name">店舗名 <span class="required">*必須</span></label>
            <input type="text" id="store_name" name="store_name" required maxlength="50" placeholder="例: 渋谷店、本店">
            <div class="char-count"><span id="nameCount">0</span> / 50文字</div>
        </div>
        
        <!-- アイコン選択 -->
        <div class="form-group">
            <label>店舗アイコン <span class="required">*必須</span></label>
            <div class="icon-selector">
                <label class="icon-option">
                    <input type="radio" name="store_icon" value="🏪" checked>
                    <span class="icon-preview">🏪</span>
                </label>
                <label class="icon-option">
                    <input type="radio" name="store_icon" value="🏬">
                    <span class="icon-preview">🏬</span>
                </label>
                <label class="icon-option">
                    <input type="radio" name="store_icon" value="🏢">
                    <span class="icon-preview">🏢</span>
                </label>
                <label class="icon-option">
                    <input type="radio" name="store_icon" value="🏭">
                    <span class="icon-preview">🏭</span>
                </label>
                <label class="icon-option">
                    <input type="radio" name="store_icon" value="🏛️">
                    <span class="icon-preview">🏛️</span>
                </label>
                <label class="icon-option">
                    <input type="radio" name="store_icon" value="🏠">
                    <span class="icon-preview">🏠</span>
                </label>
                <label class="icon-option">
                    <input type="radio" name="store_icon" value="🍕">
                    <span class="icon-preview">🍕</span>
                </label>
                <label class="icon-option">
                    <input type="radio" name="store_icon" value="🍔">
                    <span class="icon-preview">🍔</span>
                </label>
                <label class="icon-option">
                    <input type="radio" name="store_icon" value="☕">
                    <span class="icon-preview">☕</span>
                </label>
                <label class="icon-option">
                    <input type="radio" name="store_icon" value="🍰">
                    <span class="icon-preview">🍰</span>
                </label>
            </div>
        </div>
        
        <!-- パスワード -->
        <div class="form-group">
            <label for="password">管理パスワード（4桁） <span class="required">*必須</span></label>
            <input type="password" id="password" name="password" required pattern="[0-9]{4}" maxlength="4" placeholder="例: 1234">
            <small style="color: #666; font-size: 12px; display: block; margin-top: 4px;">
                ※店舗の編集・削除時に必要です。忘れないようにしてください。
            </small>
        </div>
        
        <!-- パスワード確認 -->
        <div class="form-group">
            <label for="password_confirm">パスワード確認 <span class="required">*必須</span></label>
            <input type="password" id="password_confirm" name="password_confirm" required pattern="[0-9]{4}" maxlength="4" placeholder="もう一度入力">
        </div>
        
        <!-- ボタン -->
        <div class="form-actions">
            <a href="{{ url_for('store_select') }}" class="btn btn-secondary">キャンセル</a>
            <button type="submit" class="btn btn-primary">店舗を作成</button>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}{% endblock %}
