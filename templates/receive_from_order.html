{% extends "base.html" %}

{% block title %}発注品入荷 - 在庫管理システム{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/form.css') }}">
{% endblock %}

{% block content %}
<div class="form-page">
    <h1>📦 発注品入荷</h1>
    
    <p style="margin-bottom: 20px; color: #666;">
        発注リストから在庫に登録します
    </p>
    
    <form method="POST">
        <div class="form-group">
            <label for="name">商品名 <span class="required">*必須</span></label>
            <input type="text" id="name" name="name" value="{{ order_item.item_name }}" required maxlength="50">
        </div>
        
        <div class="form-group">
            <label for="category_id">カテゴリ <span class="required">*必須</span></label>
            <select id="category_id" name="category_id" required>
                {% for category in categories %}
                <option value="{{ category.id }}">{{ category.name }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label for="quantity_level">残量レベル <span class="required">*必須</span></label>
            <div class="radio-group">
                <label>
                    <input type="radio" name="quantity_level" value="1" checked>
                    満タン
                </label>
                <label>
                    <input type="radio" name="quantity_level" value="2">
                    半分
                </label>
                <label>
                    <input type="radio" name="quantity_level" value="3">
                    少ない
                </label>
                <label>
                    <input type="radio" name="quantity_level" value="4">
                    なし
                </label>
            </div>
        </div>
        
        <div class="form-group">
            <label for="opened_date">開封日</label>
            <input type="date" id="opened_date" name="opened_date">
        </div>
        
        <div class="form-group">
            <label for="expiry_date">賞味期限</label>
            <input type="date" id="expiry_date" name="expiry_date">
        </div>
        
        <div class="form-group">
            <label for="memo">メモ</label>
            <textarea id="memo" name="memo" rows="3" maxlength="200" placeholder="発注先、ロット番号など">{{ order_item.memo if order_item.memo }}</textarea>
            <div class="char-count"><span id="memoCount">{{ order_item.memo|length if order_item.memo else 0 }}</span> / 200文字</div>
        </div>
        
        <div class="form-actions">
            <a href="{{ url_for('order_list', store_id=store_id) }}" class="btn btn-secondary">キャンセル</a>
            <button type="submit" class="btn btn-primary">在庫に登録</button>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}{% endblock %}
