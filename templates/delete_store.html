{% extends "base.html" %}

{% block title %}店舗削除 - 在庫管理システム{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/form.css') }}">
{% endblock %}

{% block content %}
<div class="form-page">
    <h1 style="color: #e74c3c;">⚠️ 店舗を削除</h1>
    
    <div class="warning-box">
        <h3>{{ store.fridge_name }}</h3>
        <p style="margin-top: 10px;">この店舗と、以下のデータが<strong>完全に削除</strong>されます：</p>
        <ul style="margin: 15px 0; padding-left: 20px;">
            <li>すべての在庫データ</li>
            <li>すべてのカテゴリ</li>
            <li>発注リスト</li>
        </ul>
        <p style="color: #e74c3c; font-weight: bold;">この操作は取り消せません！</p>
    </div>
    
    <form method="POST">
        <!-- パスワード -->
        <div class="form-group">
            <label for="password">管理パスワード（4桁） <span class="required">*必須</span></label>
            <input type="password" id="password" name="password" required pattern="[0-9]{4}" maxlength="4" placeholder="店舗作成時に設定したパスワード">
        </div>
        
        <!-- 確認テキスト -->
        <div class="form-group">
            <label for="confirm_text">確認 <span class="required">*必須</span></label>
            <input type="text" id="confirm_text" name="confirm_text" required placeholder="「削除」と入力してください">
            <small style="color: #666; font-size: 12px; display: block; margin-top: 4px;">
                ※削除を確定するには「削除」と入力してください
            </small>
        </div>
        
        <!-- ボタン -->
        <div class="form-actions">
            <a href="{{ url_for('store_select') }}" class="btn btn-secondary">キャンセル</a>
            <button type="submit" class="btn btn-danger">削除する</button>
        </div>
    </form>
</div>

{% endblock %}
